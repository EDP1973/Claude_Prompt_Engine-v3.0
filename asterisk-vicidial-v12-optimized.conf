; =============================================================================
; ASTERISK CONFIGURATION - VICIDIAL v12 OPTIMIZED
; Telnyx SIP Trunk with Intelimex Failover
; Production Ready - ViciDial Specific
; =============================================================================

; =============================================================================
; SIP TRUNK REGISTRATION
; =============================================================================

register => userluis12705:greAt$$5355o@sip.telnyx.com:5060

; =============================================================================
; GENERAL SIP SETTINGS - VICIDIAL OPTIMIZED
; =============================================================================

[general]
bindport=5060
bindaddr=0.0.0.0
context=from-sip-external
allowoverlap=no
srvlookup=yes
rtpstart=10000
rtpend=20000
maxcallbitrate=384
disallow=all
allow=ulaw,alaw,gsm
canreinvite=no
nat=yes
qualify=yes
qualifyfreq=60

; =============================================================================
; TELNYX TRUNK (PRIMARY CARRIER)
; =============================================================================

[telnyx]
type=peer
host=sip.telnyx.com
port=5060
username=userluis12705
secret=greAt$$5355o
fromuser=userluis31099
fromdomain=sip.telnyx.com
insecure=port,invite
disallow=all
allow=ulaw,alaw
dtmfmode=rfc2833
context=from-telnyx
nat=yes
directmedia=no
canreinvite=no
qualify=yes
qualifyfreq=60
trustrpid=yes
sendrpid=yes

; =============================================================================
; INTELIMEX TRUNK (BACKUP/FAILOVER CARRIER)
; =============================================================================

[intelimex]
type=peer
host=sip.intelimex.com
port=5060
username=VICIDIAL_ACCOUNT_ID
secret=YOUR_INTELIMEX_PASSWORD
fromuser=VICIDIAL_ACCOUNT_ID
insecure=port,invite
disallow=all
allow=ulaw,alaw
dtmfmode=rfc2833
context=from-intelimex
nat=yes
directmedia=no
canreinvite=no
qualify=yes
qualifyfreq=60
trustrpid=yes
sendrpid=yes

; =============================================================================
; VICIDIAL INBOUND - FROM TELNYX
; =============================================================================

[from-telnyx]
; Inbound calls from Telnyx trunk
exten => s,1,NoOp(=== TELNYX INBOUND CALL ===)
exten => s,n,NoOp(CallerID: ${CALLERID(all)} | Context: ${CONTEXT})
exten => s,n,Set(CHANNEL(language)=en)

; Extract CallerID from SIP headers
exten => s,n,Set(CALLERID(num)=${SIP_HEADER(P-Preferred-Identity)})
exten => s,n,GotoIf($[${LEN(${CALLERID(num)})}=0]?get-remote-party)
exten => s,n,GoTo(vicidial-inbound)

exten => s,n(get-remote-party),Set(CALLERID(num)=${SIP_HEADER(Remote-Party-ID)})

; Extract DID and prep for ViciDial
exten => s,n(vicidial-inbound),NoOp(Processing inbound for ViciDial)
exten => s,n,Set(DID=${SIP_HEADER(Request-URI)})
exten => s,n,NoOp(DID: ${DID})

; Set variables for ViciDial AGI
exten => s,n,Set(VICIDIAL_CARRIER=TELNYX)
exten => s,n,Set(VICIDIAL_DID=${DID})

; Log call to ViciDial database via AGI
exten => s,n,AGI(agi://127.0.0.1:4577/call_log)
exten => s,n,NoOp(AGI call_log completed)

; ViciDial inbound queue routing
exten => s,n,Queue(inbound,,,${VICIDIAL_CAMPAIGN})
exten => s,n,NoOp(Queue timeout or no agents)

; Voicemail fallback
exten => s,n(voicemail),Voicemail(u${MAILBOX},s)
exten => s,n,HangUp()

; Invalid extension handling
exten => i,1,Playtones(invalid)
exten => i,n,Wait(2)
exten => i,n,HangUp()

; =============================================================================
; VICIDIAL INBOUND - FROM INTELIMEX (BACKUP)
; =============================================================================

[from-intelimex]
; Backup inbound from Intelimex
exten => s,1,NoOp(=== INTELIMEX INBOUND CALL ===)
exten => s,n,NoOp(CallerID: ${CALLERID(all)})

exten => s,n,Set(CALLERID(num)=${SIP_HEADER(P-Preferred-Identity)})
exten => s,n,GotoIf($[${LEN(${CALLERID(num)})}=0]?get-remote-party)
exten => s,n,GoTo(vicidial-inbound)

exten => s,n(get-remote-party),Set(CALLERID(num)=${SIP_HEADER(Remote-Party-ID)})

exten => s,n(vicidial-inbound),NoOp(Processing Intelimex inbound)
exten => s,n,Set(DID=${SIP_HEADER(Request-URI)})
exten => s,n,Set(VICIDIAL_CARRIER=INTELIMEX)
exten => s,n,Set(VICIDIAL_DID=${DID})

exten => s,n,AGI(agi://127.0.0.1:4577/call_log)
exten => s,n,Queue(inbound,,,${VICIDIAL_CAMPAIGN})
exten => s,n,Voicemail(u${MAILBOX},s)
exten => s,n,HangUp()

exten => i,1,Playtones(invalid)
exten => i,n,Wait(2)
exten => i,n,HangUp()

; =============================================================================
; VICIDIAL OUTBOUND - ViciDial Agent to PSTN via Telnyx/Intelimex
; =============================================================================

[vicidial-outbound]
; Outbound calls from ViciDial agents through Telnyx primary

exten => _91NXXNXXXXXX,1,NoOp(=== VICIDIAL OUTBOUND ===)
exten => _91NXXNXXXXXX,n,NoOp(Extension: ${EXTEN} | Agent: ${VICIDIAL_AGENT_ID})

; Set CallerID from agent/campaign
exten => _91NXXNXXXXXX,n,Set(CALLERID(num)=${VICIDIAL_AGENT_NUMBER})
exten => _91NXXNXXXXXX,n,Set(CALLERID(name)=${VICIDIAL_CAMPAIGN_NAME})

; Set ViciDial variables
exten => _91NXXNXXXXXX,n,Set(VICIDIAL_CAMPAIGN_OUTBOUND=yes)
exten => _91NXXNXXXXXX,n,Set(DIALED_NUMBER=${EXTEN:1})

; Log outbound call to ViciDial database
exten => _91NXXNXXXXXX,n,AGI(agi://127.0.0.1:4577/call_log)

; Dial through Telnyx (primary carrier)
exten => _91NXXNXXXXXX,n,Dial(SIP/${DIALED_NUMBER}@telnyx,60)
exten => _91NXXNXXXXXX,n,NoOp(Dial result: ${DIALSTATUS})

; Check if call answered
exten => _91NXXNXXXXXX,n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?end-call)

; Failover to Intelimex if Telnyx fails
exten => _91NXXNXXXXXX,n,NoOp(Telnyx failed - trying Intelimex backup)
exten => _91NXXNXXXXXX,n,Dial(SIP/${DIALED_NUMBER}@intelimex,60)
exten => _91NXXNXXXXXX,n,NoOp(Backup result: ${DIALSTATUS})

exten => _91NXXNXXXXXX,n(end-call),NoOp(Call completed - ${DIALSTATUS})
exten => _91NXXNXXXXXX,n,HangUp()

; =============================================================================
; VICIDIAL CONTEXT FOR TRANSFERS/CONFERENCES
; =============================================================================

[vicidial-transfers]
; ViciDial transfer/conference handling
exten => s,1,NoOp(=== VICIDIAL TRANSFER ===)
exten => s,n,AGI(agi://127.0.0.1:4577/transfer-handler)
exten => s,n,HangUp()

; =============================================================================
; ERROR/FALLBACK CONTEXTS
; =============================================================================

[error-handling]
; Handle various call failures
exten => busy,1,Playtones(busy)
exten => busy,n,Wait(3)
exten => busy,n,HangUp()

exten => congestion,1,Playtones(congestion)
exten => congestion,n,Wait(3)
exten => congestion,n,HangUp()

exten => noanswer,1,Voicemail(u${MAILBOX},s)
exten => noanswer,n,HangUp()

exten => unreachable,1,Playtones(invalid)
exten => unreachable,n,Wait(2)
exten => unreachable,n,HangUp()

; =============================================================================
; LEGACY/DEFAULT CONTEXT (FOR COMPATIBILITY)
; =============================================================================

[from-sip-external]
; Legacy context for any external SIP calls
exten => s,1,NoOp(External SIP call)
exten => s,n,GoTo(from-telnyx,s,1)

; =============================================================================
; CONFIGURATION NOTES FOR VICIDIAL v12
; =============================================================================

; INSTALLATION CHECKLIST:
; =======================
; 1. Copy this file to: /etc/asterisk/extensions.conf
; 2. Update credentials:
;    - Replace VICIDIAL_ACCOUNT_ID with Intelimex account ID
;    - Replace YOUR_INTELIMEX_PASSWORD with Intelimex SIP password
; 
; 3. Verify AGI endpoint running:
;    ViciDial AGI server: 127.0.0.1:4577
;    Required AGI scripts:
;    - call_log (call logging)
;    - agent-login (agent registration)
;    - transfer-handler (transfer handling)
;
; 5. Set ViciDial variables:
;    VICIDIAL_AGENT_ID = Agent ID from ViciDial
;    VICIDIAL_AGENT_NUMBER = Agent's caller ID number
;    VICIDIAL_CAMPAIGN_NAME = Campaign name for CallerID
;    VICIDIAL_CAMPAIGN = Campaign for queue routing
;    MAILBOX = Agent's voicemail mailbox
;
; 6. Reload Asterisk configuration:
;    asterisk -rx "dialplan reload"
;    asterisk -rx "sip reload"
;
; OUTBOUND DIAL PATTERN:
; ======================
; Pattern: _91NXXNXXXXXX
; Example: 918005551234 dials 1-800-555-1234
; Routing: Telnyx (primary) → Intelimex (failover)
;
; INBOUND CONTEXTS:
; =================
; from-telnyx    = Incoming calls from Telnyx trunk
; from-intelimex = Incoming calls from Intelimex (backup)
; Both route to ViciDial inbound queue for agent assignment
;
; FAILOVER:
; =========
; Primary: Telnyx (userluis12705@sip.telnyx.com)
; Backup: Intelimex (on Telnyx failure)
; Automatic failover with 60-second timeout
;
; TESTING:
; ========
; Test inbound: asterisk -r
;               dialplan show from-telnyx
;
; Test outbound pattern:
;               asterisk -r
;               console dial 918005551234
;
; Monitor SIP:   ngrep -W byline -d any port 5060
;
; Check AGI:     telnet 127.0.0.1 4577
;
; =============================================================================
