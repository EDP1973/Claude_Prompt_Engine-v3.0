; =============================================================================
; ViciDial v12 Dialplans - Inbound & Outbound with Intelimex Carrier
; Production-ready configuration
; =============================================================================

; ============================================================================
; OUTBOUND DIALPLAN - TO INTELIMEX CARRIER
; ============================================================================

[from-internal]
; Route calls from ViciDial agents to Intelimex carrier
exten => _X.,1,NoOp(Outbound call from ViciDial to ${EXTEN})
exten => _X.,n,Set(CALLERID(num)=${VICIDIAL_AGENT_NUMBER})
exten => _X.,n,Set(CALLERID(name)=${VICIDIAL_CAMPAIGN_NAME})

; Normalize number format for Intelimex
exten => _X.,n,GotoIf($["${LEN(${EXTEN})}" = "10"]?normalize_10digit)
exten => _X.,n,GotoIf($["${LEN(${EXTEN})}" = "11"]?normalize_11digit)
exten => _X.,n,GoTo(dial_intelimex)

; Normalize 10-digit numbers (add 1 prefix)
exten => _X.,n(normalize_10digit),Set(DIALED_NUMBER=1${EXTEN})
exten => _X.,n,GoTo(dial_intelimex)

; Normalize 11-digit numbers
exten => _X.,n(normalize_11digit),Set(DIALED_NUMBER=${EXTEN})

; Dial through Intelimex SIP trunk
exten => _X.,n(dial_intelimex),NoOp(Dialing ${DIALED_NUMBER} through Intelimex)
exten => _X.,n,Dial(SIP/${DIALED_NUMBER}@INTELIMEX_TRUNK,60,gM(record-call))
exten => _X.,n,GoTo(check-dial-result)

; Handle dial result
exten => _X.,n(check-dial-result),NoOp(Dial status: ${DIALSTATUS})
exten => _X.,n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?end)
exten => _X.,n,GotoIf($["${DIALSTATUS}" = "BUSY"]?busy)
exten => _X.,n,GotoIf($["${DIALSTATUS}" = "CONGESTION"]?congestion)
exten => _X.,n,GotoIf($["${DIALSTATUS}" = "NOANSWER"]?noanswer)
exten => _X.,n,GoTo(hangup)

exten => _X.,n(busy),Playtones(busy)
exten => _X.,n,Wait(3)
exten => _X.,n,HangUp()

exten => _X.,n(congestion),Playtones(congestion)
exten => _X.,n,Wait(3)
exten => _X.,n,HangUp()

exten => _X.,n(noanswer),NoOp(No answer from called party)
exten => _X.,n,HangUp()

exten => _X.,n(end),NoOp(Call connected successfully)
exten => _X.,n(hangup),HangUp()

; ============================================================================
; INBOUND DIALPLAN - FROM INTELIMEX CARRIER TO VICIDIAL
; ============================================================================

[from-intelimex]
; Receive calls from Intelimex and route to ViciDial
exten => s,1,NoOp(Inbound call received from Intelimex)
exten => s,n,Set(CALLERID(num)=${SIP_HEADER(P-Preferred-Identity)})
exten => s,n,GotoIf($[${LEN(${CALLERID(num)})}=0]?use-remote-party)
exten => s,n,GoTo(process-inbound)

exten => s,n(use-remote-party),Set(CALLERID(num)=${SIP_HEADER(Remote-Party-ID)})

; Extract DID from request URI
exten => s,n(process-inbound),Set(DID=${SIP_HEADER(Request-URI)})
exten => s,n,NoOp(DID: ${DID}, CALLERID: ${CALLERID(num)})

; Log inbound call to ViciDial database
exten => s,n,AGI(agi-vicidial-inbound.agi)

; Route to ViciDial inbound queue based on DID
exten => s,n,Queue(inbound-queue,,,${VICIDIAL_CAMPAIGN})
exten => s,n,GoTo(inbound-failed)

exten => s,n(inbound-failed),NoOp(Queue timeout or no agents available)
exten => s,n,Voicemail(u${MAILBOX})
exten => s,n,HangUp()

exten => i,1,Playtones(invalid)
exten => i,n,Wait(2)
exten => i,n,HangUp()

; ============================================================================
; SIP TRUNK CONFIGURATION FOR INTELIMEX
; ============================================================================

[general]
; Core SIP settings
bindport=5060
bindaddr=0.0.0.0
context=from-sip-external
allowoverlap=no
srvlookup=yes
rtpstart=10000
rtpend=20000

; Codec preferences
disallow=all
allow=ulaw,alaw,gsm

[INTELIMEX_TRUNK]
; Intelimex SIP Trunk Configuration
type=peer
host=sip.intelimex.com
port=5060
context=from-intelimex
username=VICIDIAL_ACCOUNT_ID
fromuser=VICIDIAL_ACCOUNT_ID
secret=YOUR_INTELIMEX_PASSWORD
directmedia=no
insecure=port,invite
nat=yes
dtmfmode=rfc2833
timeout=30000
qualify=yes
qualifyfreq=60
reinvite=update

; Media encryption (optional but recommended)
encryption=yes
srtpprofile=SRTP_PROFILE_SDES
srtpcrypto=AES_CM_128_HMAC_SHA1_32

; Inbound settings
canreinvite=no
trustrpid=yes
sendrpid=yes
trustport=yes

; Disable video/text
videosupport=no

; ============================================================================
; VICIDIAL-SPECIFIC CONTEXTS
; ============================================================================

[from-vicidial-phones]
; ViciDial agent phones context
exten => 100,1,NoOp(ViciDial Agent Extension: ${EXTEN})
exten => 100,n,Dial(SIP/${EXTEN})
exten => 100,n,VoiceMail(u${EXTEN})
exten => 100,n,HangUp()

exten => _X.,1,NoOp(Checking if extension exists in ViciDial)
exten => _X.,n,GotoIf($[${DB_EXISTS(vicidial/agents/${EXTEN})}]?agent-exists:unknown)

exten => _X.,n(agent-exists),NoOp(Routing to agent ${EXTEN})
exten => _X.,n,Dial(SIP/${EXTEN})
exten => _X.,n,VoiceMail(u${EXTEN})
exten => _X.,n,HangUp()

exten => _X.,n(unknown),Playtones(invalid)
exten => _X.,n,Wait(2)
exten => _X.,n,HangUp()

; ============================================================================
; RECORDING MACRO FOR CALL RECORDING
; ============================================================================

[macro-record-call]
; Record all calls for compliance
exten => s,1,NoOp(Recording call - CallID: ${UNIQUEID})
exten => s,n,Set(TIMESTAMP=${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)})
exten => s,n,Set(FILENAME=/var/spool/asterisk/monitor/${TIMESTAMP}-${UNIQUEID})
exten => s,n,MixMonitor(${FILENAME}.wav,b(mix-monitor-callback^s^1))
exten => s,n,MacroExit()

; ============================================================================
; ERROR HANDLING CONTEXT
; ============================================================================

[error-handling]
; Handle various error scenarios
exten => busy,1,Playtones(busy)
exten => busy,n,Wait(3)
exten => busy,n,HangUp()

exten => congestion,1,Playtones(congestion)
exten => congestion,n,Wait(3)
exten => congestion,n,HangUp()

exten => noanswer,1,Voicemail(u${MAILBOX})
exten => noanswer,n,HangUp()

exten => unreachable,1,Playtones(invalid)
exten => unreachable,n,Wait(2)
exten => unreachable,n,HangUp()

; ============================================================================
; FAILOVER CONFIGURATION
; ============================================================================

; Backup carrier trunk (optional)
[BACKUP_CARRIER_TRUNK]
type=peer
host=backup-sip.carrier.com
port=5060
context=from-backup-carrier
username=BACKUP_ACCOUNT
secret=BACKUP_PASSWORD
nat=yes
dtmfmode=rfc2833

; Failover dialplan
[failover-logic]
exten => _X.,1,NoOp(Attempting primary carrier)
exten => _X.,n,Dial(SIP/${EXTEN}@INTELIMEX_TRUNK,30)
exten => _X.,n,GotoIf($["${DIALSTATUS}" != "ANSWER"]?try-backup)
exten => _X.,n,HangUp()

exten => _X.,n(try-backup),NoOp(Primary failed, trying backup carrier)
exten => _X.,n,Dial(SIP/${EXTEN}@BACKUP_CARRIER_TRUNK,30)
exten => _X.,n,HangUp()

; ============================================================================
; NOTES FOR PRODUCTION DEPLOYMENT
; ============================================================================

; 1. Replace VICIDIAL_ACCOUNT_ID with your actual Intelimex account ID
; 2. Replace YOUR_INTELIMEX_PASSWORD with your actual SIP password
; 3. Configure ViciDial AGI scripts: agi-vicidial-inbound.agi, agi-vicidial-outbound.agi
; 4. Ensure all .agi files are in /var/lib/asterisk/agi-bin/
; 5. Set proper file permissions: chmod 755 /var/lib/asterisk/agi-bin/*.agi
; 6. Configure ViciDial database connection in AGI scripts
; 7. Test with: asterisk -vvvvc | grep -E "(INTELIMEX|vicidial)"
; 8. Monitor SIP traffic: ngrep -W byline -d any port 5060
; 9. Verify recording directory exists: mkdir -p /var/spool/asterisk/monitor
; 10. Set recording permissions: chown asterisk:asterisk /var/spool/asterisk/monitor
