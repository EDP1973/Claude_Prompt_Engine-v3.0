name: Build Self-Contained Installers

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'
  release:
    types: [published]
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build Linux Packages
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install fpm
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby-dev rubygems
          sudo gem install fpm
      
      - name: Get version
        id: version
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          VERSION=${VERSION#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Build DEB and RPM packages
        run: |
          bash build/build-all.sh ${{ steps.version.outputs.VERSION }}
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: linux-packages
          path: dist/*.{deb,rpm}
          retention-days: 30

  build-macos:
    name: Build macOS Packages
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Get version
        id: version
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          VERSION=${VERSION#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Build PKG and DMG packages
        run: |
          bash build/build-all.sh ${{ steps.version.outputs.VERSION }}
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: macos-packages
          path: dist/*.{pkg,dmg}
          retention-days: 30

  build-windows:
    name: Build Windows Packages
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install NSIS
        run: choco install nsis -y
      
      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          VERSION=${VERSION#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Build EXE installer
        shell: bash
        run: bash build/build-all.sh ${{ steps.version.outputs.VERSION }}
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: windows-packages
          path: dist/*.exe
          retention-days: 30

  test-linux-install:
    name: Test Linux Installation
    runs-on: ubuntu-latest
    needs: build-linux
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Download DEB package
        uses: actions/download-artifact@v3
        with:
          name: linux-packages
      
      - name: Test DEB installation
        run: |
          sudo dpkg -i *.deb || sudo apt-get install -f -y
          if [ -d "/opt/claude-prompt-engine" ]; then
            echo "✓ Installation successful"
          else
            echo "✗ Installation failed"
            exit 1
          fi

  test-macos-install:
    name: Test macOS Installation
    runs-on: macos-latest
    needs: build-macos
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Download PKG package
        uses: actions/download-artifact@v3
        with:
          name: macos-packages
      
      - name: Test PKG installation
        run: |
          sudo installer -pkg *.pkg -target /
          if [ -d "/Applications/claude-prompt-engine" ]; then
            echo "✓ Installation successful"
          else
            echo "✗ Installation failed"
            exit 1
          fi
