<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Builder — Import + Query</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ─────────────────────────────────────────────────────── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(0,212,255,0.2);
      flex-shrink: 0;
    }
    #topbar h1 { font-size: 16px; font-weight: 700; color: #00d4ff; display: flex; align-items: center; gap: 8px; }
    #status-strip {
      font-size: 12px;
      color: #888;
      background: rgba(0,212,255,0.06);
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid rgba(0,212,255,0.15);
      transition: all .3s;
    }
    #status-strip.ready { color: #00d4ff; border-color: rgba(0,212,255,0.4); }

    /* ── Split pane ──────────────────────────────────────────────────── */
    #split {
      display: flex;
      flex: 1;
      min-height: 0;
      gap: 0;
    }

    .pane {
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: rgba(255,255,255,0.02);
    }

    #pane-import { flex: 0 0 47%; border-right: 2px solid rgba(0,212,255,0.2); }
    #pane-query  { flex: 1; }

    .pane-header {
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 700;
      color: #00d4ff;
      background: rgba(0,212,255,0.05);
      border-bottom: 1px solid rgba(0,212,255,0.15);
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
      min-height: 0;
    }

    /* ── Import complete banner ──────────────────────────────────────── */
    #import-banner {
      display: none;
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, rgba(0,30,30,0.97), rgba(0,15,25,0.97));
      border: 1px solid rgba(0,212,255,0.5);
      border-radius: 12px;
      padding: 14px 22px;
      z-index: 999;
      font-size: 13px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      max-width: 480px;
      width: calc(100% - 32px);
    }
    #import-banner.show { display: flex; align-items: center; gap: 14px; animation: slideUp .35s ease; }
    #import-banner .icon { font-size: 26px; flex-shrink: 0; }
    #import-banner .text strong { color: #00d4ff; }
    #import-banner .close-btn {
      margin-left: auto;
      cursor: pointer;
      color: #888;
      font-size: 18px;
      flex-shrink: 0;
      line-height: 1;
      transition: color .2s;
    }
    #import-banner .close-btn:hover { color: #fff; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ── Column chips (inside banner) ─────────────────────────────── */
    .col-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
    .col-chip {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(0,212,255,0.12);
      border: 1px solid rgba(0,212,255,0.3);
      color: #00d4ff;
    }
    .col-chip.manual { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.15); color: #aaa; }
  </style>
</head>
<body>

  <!-- ── Top bar ─────────────────────────────────────────────────── -->
  <div id="topbar">
    <h1>⚡ Smart Builder</h1>
    <div id="status-strip">Upload a file on the left → query builder populates automatically</div>
  </div>

  <!-- ── Split layout ────────────────────────────────────────────── -->
  <div id="split">
    <div class="pane" id="pane-import">
      <div class="pane-header">📥 Data Import — upload &amp; smart-map columns</div>
      <iframe id="import-frame" src="/data-import.html" title="Data Import Wizard"></iframe>
    </div>
    <div class="pane" id="pane-query">
      <div class="pane-header">🔍 Query Builder — build your query</div>
      <iframe id="query-frame" src="/query-builder-form.html" title="Query Builder"></iframe>
    </div>
  </div>

  <!-- ── Import complete toast ───────────────────────────────────── -->
  <div id="import-banner">
    <div class="icon">✅</div>
    <div class="text">
      <div><strong id="banner-count">0</strong> records imported — detected columns:</div>
      <div class="col-chips" id="banner-chips"></div>
    </div>
    <div class="close-btn" onclick="document.getElementById('import-banner').classList.remove('show')">✕</div>
  </div>

  <script>
    window.addEventListener('message', function(event) {
      if (!event.data || event.data.type !== 'importComplete') return;

      const { mappings, rows, analysisResults, stats } = event.data;

      // Update status strip
      const strip = document.getElementById('status-strip');
      strip.textContent = `✅ ${(rows || []).length} records imported — query builder ready`;
      strip.classList.add('ready');

      // Show banner
      const banner = document.getElementById('import-banner');
      const count  = document.getElementById('banner-count');
      const chips  = document.getElementById('banner-chips');
      count.textContent = (rows || []).length;
      chips.innerHTML = '';
      (mappings || []).forEach(m => {
        if (!m.vicidialField) return;
        const chip = document.createElement('span');
        chip.className = 'col-chip';
        chip.title = `${m.sourceColumn} → ${m.vicidialField}`;
        chip.textContent = m.label || m.sourceColumn;
        chips.appendChild(chip);
      });
      banner.classList.add('show');
      setTimeout(() => banner.classList.remove('show'), 8000);

      // Forward detected columns to query builder iframe
      const qf = document.getElementById('query-frame');
      if (qf && qf.contentWindow) {
        qf.contentWindow.postMessage({
          type: 'columnsDetected',
          mappings: mappings,
          rowCount: (rows || []).length,
          analysisResults: analysisResults
        }, '*');
      }
    });
  </script>
</body>
</html>
