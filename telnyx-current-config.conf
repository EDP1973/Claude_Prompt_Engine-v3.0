; =============================================================================
; CONFIGURATION DETAILS
; =============================================================================
;
; TRUNK SETTINGS:
; ===============
; Host: sip.telnyx.com
; Port: 5060 (default SIP)
; Username: userluis12705
; Password: greAt$$5355o
; FromUser: userluis31099
; FromDomain: sip.telnyx.com
; Inbound Context: trunkinbound
;
; OUTBOUND:
; =========
; Pattern: _91NXXNXXXXXX (9 followed by 1 + 10 digits)
; Example: 91-800-555-1234 -> dials 1-800-555-1234 through Telnyx
