;=============================================================================
; ViciDial v12 Dialplans - Inbound & Outbound with Intelimex & Telnyx
; Production-ready configuration with access info
;=============================================================================

;=============================================================================
; SIP TRUNK REGISTRATION & CONFIGURATION
;=============================================================================

; Register with Telnyx
register => userluis12705:greAt$$5355o@sip.telnyx.com:5060

;=============================================================================
; GENERAL SIP SETTINGS
;=============================================================================

[general]
; Core SIP settings
bindport=5060
bindaddr=0.0.0.0
context=from-sip-external
allowoverlap=no
srvlookup=yes
rtpstart=10000
rtpend=20000

; Codec preferences
disallow=all
allow=ulaw,alaw,gsm

;=============================================================================
; TELNYX TRUNK CONFIGURATION (ACTIVE)
;=============================================================================

[telnyx]
type=peer
host=sip.telnyx.com
port=5060
username=userluis12705
secret=greAt$$5355o
fromuser=userluis31099
fromdomain=sip.telnyx.com
insecure=port,invite
disallow=all
allow=ulaw,alaw
dtmfmode=rfc2833
context=trunkinbound
nat=yes
directmedia=no
canreinvite=no
qualify=yes
qualifyfreq=60

;=============================================================================
; INTELIMEX TRUNK CONFIGURATION (BACKUP)
;=============================================================================

[INTELIMEX_TRUNK]
type=peer
host=sip.intelimex.com
port=5060
username=VICIDIAL_ACCOUNT_ID
fromuser=VICIDIAL_ACCOUNT_ID
secret=YOUR_INTELIMEX_PASSWORD
context=from-intelimex
insecure=port,invite
disallow=all
allow=ulaw,alaw
dtmfmode=rfc2833
nat=yes
directmedia=no
canreinvite=no
qualify=yes
qualifyfreq=60

;=============================================================================
; OUTBOUND DIALPLAN - TELNYX PRIMARY
;=============================================================================

[default]
; Outbound calls through Telnyx via ViciDial
exten => _91NXXNXXXXXX,1,AGI(agi://127.0.0.1:4577/call_log)
exten => _91NXXNXXXXXX,2,Dial(SIP/${EXTEN:1}@telnyx,60,tTor)
exten => _91NXXNXXXXXX,3,HangUp()

;=============================================================================
; ALTERNATIVE OUTBOUND - FROM-INTERNAL (FOR VICIDIAL AGENTS)
;=============================================================================

[from-internal]
; Route calls from ViciDial agents through Telnyx (primary) or Intelimex (backup)
exten => _X.,1,NoOp(Outbound call from ViciDial - ${EXTEN})
exten => _X.,n,Set(CALLERID(num)=${VICIDIAL_AGENT_NUMBER})
exten => _X.,n,Set(CALLERID(name)=${VICIDIAL_CAMPAIGN_NAME})

; Normalize number format
exten => _X.,n,GotoIf($["${LEN(${EXTEN})}" = "10"]?normalize_10digit)
exten => _X.,n,GotoIf($["${LEN(${EXTEN})}" = "11"]?normalize_11digit)
exten => _X.,n,GoTo(dial_telnyx)

; Normalize 10-digit (add 1 prefix)
exten => _X.,n(normalize_10digit),Set(DIALED_NUMBER=1${EXTEN})
exten => _X.,n,GoTo(dial_telnyx)

; Normalize 11-digit
exten => _X.,n(normalize_11digit),Set(DIALED_NUMBER=${EXTEN})

; Dial through Telnyx (primary)
exten => _X.,n(dial_telnyx),NoOp(Dialing ${DIALED_NUMBER} through Telnyx)
exten => _X.,n,AGI(agi://127.0.0.1:4577/call_log)
exten => _X.,n,Dial(SIP/${DIALED_NUMBER}@telnyx,60,gM(record-call))
exten => _X.,n,GoTo(check-dial-result)

; Handle dial result
exten => _X.,n(check-dial-result),NoOp(Dial status: ${DIALSTATUS})
exten => _X.,n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?end)
exten => _X.,n,GotoIf($["${DIALSTATUS}" = "BUSY"]?busy)
exten => _X.,n,GotoIf($["${DIALSTATUS}" = "CONGESTION"]?try-intelimex)
exten => _X.,n,GotoIf($["${DIALSTATUS}" = "NOANSWER"]?noanswer)
exten => _X.,n,GoTo(hangup)

; Failover to Intelimex if Telnyx fails
exten => _X.,n(try-intelimex),NoOp(Telnyx unavailable, trying Intelimex)
exten => _X.,n,Dial(SIP/${DIALED_NUMBER}@INTELIMEX_TRUNK,60,gM(record-call))
exten => _X.,n,GoTo(check-dial-result-backup)

exten => _X.,n(check-dial-result-backup),NoOp(Backup carrier status: ${DIALSTATUS})
exten => _X.,n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?end)
exten => _X.,n,GoTo(congestion)

exten => _X.,n(busy),Playtones(busy)
exten => _X.,n,Wait(3)
exten => _X.,n,HangUp()

exten => _X.,n(congestion),Playtones(congestion)
exten => _X.,n,Wait(3)
exten => _X.,n,HangUp()

exten => _X.,n(noanswer),NoOp(No answer from called party)
exten => _X.,n,HangUp()

exten => _X.,n(end),NoOp(Call connected successfully)
exten => _X.,n(hangup),HangUp()

;=============================================================================
; INBOUND DIALPLAN - FROM TELNYX TRUNK
;=============================================================================

[trunkinbound]
; Receive calls from Telnyx and route to ViciDial
exten => s,1,NoOp(Inbound call received from Telnyx)
exten => s,n,Set(CALLERID(num)=${SIP_HEADER(P-Preferred-Identity)})
exten => s,n,GotoIf($[${LEN(${CALLERID(num)})}=0]?use-remote-party)
exten => s,n,GoTo(process-inbound)

exten => s,n(use-remote-party),Set(CALLERID(num)=${SIP_HEADER(Remote-Party-ID)})

; Extract DID
exten => s,n(process-inbound),Set(DID=${SIP_HEADER(Request-URI)})
exten => s,n,NoOp(DID: ${DID}, CALLERID: ${CALLERID(num)})

; Log inbound call to ViciDial database
exten => s,n,AGI(agi://127.0.0.1:4577/call_log)

; Route to ViciDial inbound queue
exten => s,n,Queue(inbound-queue,,,${VICIDIAL_CAMPAIGN})
exten => s,n,GoTo(inbound-failed)

exten => s,n(inbound-failed),NoOp(Queue timeout or no agents available)
exten => s,n,Voicemail(u${MAILBOX})
exten => s,n,HangUp()

exten => i,1,Playtones(invalid)
exten => i,n,Wait(2)
exten => i,n,HangUp()

;=============================================================================
; INBOUND DIALPLAN - FROM INTELIMEX TRUNK (BACKUP)
;=============================================================================

[from-intelimex]
; Receive calls from Intelimex (backup carrier)
exten => s,1,NoOp(Inbound call received from Intelimex)
exten => s,n,Set(CALLERID(num)=${SIP_HEADER(P-Preferred-Identity)})
exten => s,n,GotoIf($[${LEN(${CALLERID(num)})}=0]?use-remote-party)
exten => s,n,GoTo(process-inbound)

exten => s,n(use-remote-party),Set(CALLERID(num)=${SIP_HEADER(Remote-Party-ID)})

exten => s,n(process-inbound),Set(DID=${SIP_HEADER(Request-URI)})
exten => s,n,NoOp(Intelimex DID: ${DID}, CALLERID: ${CALLERID(num)})

exten => s,n,AGI(agi://127.0.0.1:4577/call_log)
exten => s,n,Queue(inbound-queue,,,${VICIDIAL_CAMPAIGN})
exten => s,n,GoTo(inbound-failed)

exten => s,n(inbound-failed),NoOp(Queue timeout)
exten => s,n,Voicemail(u${MAILBOX})
exten => s,n,HangUp()

exten => i,1,Playtones(invalid)
exten => i,n,Wait(2)
exten => i,n,HangUp()

;=============================================================================
; VICIDIAL AGENT PHONES
;=============================================================================

[from-vicidial-phones]
; ViciDial agent extensions
exten => 100,1,NoOp(ViciDial Agent Extension: ${EXTEN})
exten => 100,n,Dial(SIP/${EXTEN})
exten => 100,n,VoiceMail(u${EXTEN})
exten => 100,n,HangUp()

exten => _X.,1,NoOp(Checking if extension exists in ViciDial)
exten => _X.,n,GotoIf($[${DB_EXISTS(vicidial/agents/${EXTEN})}]?agent-exists:unknown)

exten => _X.,n(agent-exists),NoOp(Routing to agent ${EXTEN})
exten => _X.,n,Dial(SIP/${EXTEN})
exten => _X.,n,VoiceMail(u${EXTEN})
exten => _X.,n,HangUp()

exten => _X.,n(unknown),Playtones(invalid)
exten => _X.,n,Wait(2)
exten => _X.,n,HangUp()

;=============================================================================
; RECORDING MACRO
;=============================================================================

[macro-record-call]
; Record all calls for compliance
exten => s,1,NoOp(Recording call - CallID: ${UNIQUEID})
exten => s,n,Set(TIMESTAMP=${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)})
exten => s,n,Set(FILENAME=/var/spool/asterisk/monitor/${TIMESTAMP}-${UNIQUEID})
exten => s,n,MixMonitor(${FILENAME}.wav,b(mix-monitor-callback^s^1))
exten => s,n,MacroExit()

;=============================================================================
; ERROR HANDLING
;=============================================================================

[error-handling]
exten => busy,1,Playtones(busy)
exten => busy,n,Wait(3)
exten => busy,n,HangUp()

exten => congestion,1,Playtones(congestion)
exten => congestion,n,Wait(3)
exten => congestion,n,HangUp()

exten => noanswer,1,Voicemail(u${MAILBOX})
exten => noanswer,n,HangUp()

;=============================================================================
; CONFIGURATION SUMMARY
;=============================================================================

; ACTIVE CONFIGURATION:
; Primary Carrier: Telnyx (sip.telnyx.com)
; Account: userluis12705
; Backup Carrier: Intelimex (sip.intelimex.com)
;
